<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#2f4154">
    <link rel="icon" href="{{ '/assets/site-mark.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body class="{{ page.body_class }}">
    <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>

    <header class="hero {% if page.hero_home %}hero-home{% else %}hero-compact{% endif %} {{ page.hero_class }}" id="top">
      {% include nav.html %}

      <div class="hero-mask">
        <div class="hero-text fade-in-up">
          {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
          <h1>{{ page.hero_title | default: page.title }}</h1>
        </div>
        {% if page.scroll_down %}<a class="scroll-down" href="#board" aria-label="滚动到内容">⌄</a>{% endif %}
      </div>
    </header>

    <main class="main-wrap">
      {{ content }}
    </main>

    <footer class="footer">
      <p>© 2026 sherlock</p>
      <a href="#top" aria-label="返回顶部">TOP</a>
    </footer>

    <script src="{{ '/script.js' | relative_url }}"></script>
  </body>
</html>
